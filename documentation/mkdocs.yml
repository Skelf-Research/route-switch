site_name: Route-Switch
site_description: A Go-powered prompt function manager with MIPROv2 optimization and multi-provider routing
site_url: https://docs.skelfresearch.com/route-switch/

repo_name: Skelf-Research/route-switch
repo_url: https://github.com/Skelf-Research/route-switch
edit_uri: edit/main/documentation/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - tags

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Prompt Templates: user-guide/templates.md
      - Gateway: user-guide/gateway.md
      - Optimization: user-guide/optimization.md
      - Portable Packages: user-guide/packages.md
  - Reference:
      - Configuration: reference/configuration.md
      - CLI: reference/cli.md
      - API: reference/api.md
  - Architecture: architecture.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Skelf-Research/route-switch
